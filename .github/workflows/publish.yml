name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # OIDC for PyPI trusted publishing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install twine
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # v1.13.0

      - name: Trigger submodule update in parent repo
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PARENT_REPO_DISPATCH_TOKEN }}
        run: |
          gh api repos/Mipiti/mipiti/dispatches \
            -f event_type=submodule-update \
            -f 'client_payload[submodule]=mcp-server' \
            -f 'client_payload[ref]=${{ github.sha }}'
